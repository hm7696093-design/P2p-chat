<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة P2P</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px}
        .container{width:100%;max-width:480px;background:#16213e;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,.5);display:flex;flex-direction:column;height:90vh;max-height:650px}
        .header{background:#0f3460;padding:12px 16px;display:flex;align-items:center;gap:10px;border-radius:16px 16px 0 0}
        .dot{width:10px;height:10px;border-radius:50%;background:#e94560;flex-shrink:0}
        .dot.on{background:#4ecca3;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(78,204,163,.6)}50%{box-shadow:0 0 0 8px rgba(78,204,163,0)}}
        .header span{font-size:.85rem;font-weight:700}
        .status{font-size:.65rem;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.1);margin-right:auto}
        .status.on{background:rgba(78,204,163,.2);color:#4ecca3}
        .codes{padding:10px 14px;background:rgba(0,0,0,.2);display:flex;flex-direction:column;gap:6px}
        .codes label{font-size:.65rem;color:#a0a0b0;font-weight:600}
        .row{display:flex;gap:6px}
        input{flex:1;background:#0d0d1a;border:1px solid #2a2a4a;color:#eee;padding:8px 12px;border-radius:8px;font-size:.7rem;outline:none;font-family:'Courier New',monospace;text-align:center}
        input:focus{border-color:#e94560}
        button{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.7rem;transition:.2s;font-family:inherit;white-space:nowrap}
        button:active{transform:scale(.95)}
        .btn1{background:#e94560;color:#fff}.btn2{background:#0f3460;color:#eee;border:1px solid #2a2a4a}
        .btn3{background:#4ecca3;color:#000}.btn4{background:#ffc107;color:#000}
        .msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
        .msgs::-webkit-scrollbar{width:3px}.msgs::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:10px}
        .msg{padding:8px 12px;border-radius:12px;font-size:.78rem;max-width:85%;word-break:break-word;animation:fade .3s}
        @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .self{align-self:flex-end;background:#1b3a4b;border-bottom-right-radius:3px}
        .peer{align-self:flex-start;background:#2a1a3a;border-bottom-left-radius:3px}
        .sys{align-self:center;background:rgba(255,255,255,.05);color:#a0a0b0;font-size:.65rem;padding:5px 12px;border-radius:14px;text-align:center;max-width:90%}
        .time{font-size:.55rem;opacity:.5;display:block;margin-top:2px}
        .input-row{display:flex;gap:6px;padding:10px 14px;border-top:1px solid #2a2a4a;background:rgba(0,0,0,.1)}
        .input-row input{border-radius:20px;text-align:right;font-family:inherit;font-size:.8rem}
        .send{width:40px;height:40px;border-radius:50%;background:#e94560;border:none;color:#fff;font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
        .send:disabled{background:#555;cursor:not-allowed}
        .hint{text-align:center;color:#a0a0b0;font-size:.7rem;padding:15px;line-height:1.7}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="dot" id="dot"></div>
            <span>⚡ غرفة P2P</span>
            <div class="status" id="status">غير متصل</div>
        </div>
        <div class="codes" id="codes">
            <label>🔑 كودك (انسخه وأرسله):</label>
            <div class="row"><input id="myCode" readonly placeholder="جاري التوليد..."><button class="btn2" id="copy" disabled>📋 نسخ</button></div>
            <label>📥 الصق كود صديقك:</label>
            <div class="row"><input id="peerCode" placeholder="الصق الكود..."><button class="btn3" id="join">🔗 انضمام</button></div>
            <button class="btn4" id="reset" style="width:100%">🔄 إعادة تعيين</button>
        </div>
        <div class="msgs" id="msgs"><div class="hint" id="hint">👥 أهلاً بك!<br>انسخ كودك وأرسله لصديق<br>أو الصق كوده للانضمام</div></div>
        <div class="input-row">
            <input id="msgInput" placeholder="اكتب رسالة..." disabled>
            <button class="send" id="sendBtn" disabled>➤</button>
        </div>
    </div>

    <script>
        const $=id=>document.getElementById(id);
        const dot=$('dot'),status=$('status'),myCode=$('myCode'),copy=$('copy'),peerCode=$('peerCode'),join=$('join'),
              reset=$('reset'),msgs=$('msgs'),hint=$('hint'),msgInput=$('msgInput'),sendBtn=$('sendBtn');

        let pc=null,dc=null,isHost=false,connected=false,candidates=[];

        function updStatus(on){
            connected=on;
            dot.className='dot'+(on?' on':'');
            status.className='status'+(on?' on':'');
            status.textContent=on?'✅ متصل':'غير متصل';
            msgInput.disabled=!on;
            sendBtn.disabled=!on;
            if(on)msgInput.focus();
        }

        function addSys(t){
            const d=document.createElement('div');
            d.className='msg sys';
            d.innerHTML=t+`<span class="time">${new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}</span>`;
            msgs.appendChild(d);
            msgs.scrollTop=msgs.scrollHeight;
            hint.style.display='none';
        }

        function addMsg(t,isSelf){
            const d=document.createElement('div');
            d.className='msg '+(isSelf?'self':'peer');
            const div=document.createElement('div');div.textContent=t;
            d.innerHTML=div.innerHTML+`<span class="time">${new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}</span>`;
            msgs.appendChild(d);
            msgs.scrollTop=msgs.scrollHeight;
            hint.style.display='none';
        }

        function makePC(){
            const p=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
            p.onicecandidate=e=>{if(e.candidate)candidates.push(e.candidate)};
            p.onconnectionstatechange=()=>{
                if(p.connectionState==='connected'){updStatus(true);addSys('✨ تم الاتصال!')}
                if(p.connectionState==='disconnected'||p.connectionState==='failed'){updStatus(false);addSys('⚠️ انقطع الاتصال')}
            };
            p.ondatachannel=e=>{dc=e.channel;setupDC(dc)};
            return p;
        }

        function setupDC(ch){
            dc=ch;
            ch.onopen=()=>{updStatus(true);addSys('📡 القناة مفتوحة')};
            ch.onclose=()=>{updStatus(false);addSys('📡 القناة أغلقت')};
            ch.onmessage=e=>{
                try{const d=JSON.parse(e.data);if(d.type==='chat')addMsg(d.text,false)}
                catch{addMsg(e.data,false)}
            };
        }

        async function waitICE(p){
            return new Promise(r=>{
                if(p.iceGatheringState==='complete')r();
                else p.addEventListener('icegatheringstatechange',function h(){
                    if(p.iceGatheringState==='complete'){p.removeEventListener('icegatheringstatechange',h);r()}
                });
                setTimeout(r,3000);
            });
        }

        async function doHost(){
            isHost=true;
            pc=makePC();
            dc=pc.createDataChannel('chat');
            setupDC(dc);
            const offer=await pc.createOffer();
            await pc.setLocalDescription(offer);
            await waitICE(pc);
            const full=btoa(unescape(encodeURIComponent(JSON.stringify({type:'offer',sdp:pc.localDescription.sdp,candidates}))));
            myCode.value=full;
            copy.disabled=false;
            candidates=[];
            addSys('✅ الكود جاهز - انسخه وأرسله');
        }

        async function doJoin(code){
            isHost=false;
            let data;
            try{data=JSON.parse(decodeURIComponent(escape(atob(code))))}catch{addSys('❌ كود غير صالح');return}
            pc=makePC();
            if(data.candidates)for(const c of data.candidates)try{await pc.addIceCandidate(new RTCIceCandidate(c))}catch{}
            await pc.setRemoteDescription(new RTCSessionDescription({type:'offer',sdp:data.sdp}));
            const ans=await pc.createAnswer();
            await pc.setLocalDescription(ans);
            await waitICE(pc);
            const full=btoa(unescape(encodeURIComponent(JSON.stringify({type:'answer',sdp:pc.localDescription.sdp,candidates}))));
            candidates=[];
            myCode.value=full;
            copy.disabled=false;
            addSys('📤 كود الرد جاهز - انسخه وأرسله للمضيف');
            addSys('⏳ الصق كود التأكيد من المضيف واضغط انضمام');
        }

        async function completeHost(code){
            if(!isHost)return addSys('❌ لست المضيف');
            let data;
            try{data=JSON.parse(decodeURIComponent(escape(atob(code))))}catch{addSys('❌ كود غير صالح');return}
            if(data.candidates)for(const c of data.candidates)try{await pc.addIceCandidate(new RTCIceCandidate(c))}catch{}
            await pc.setRemoteDescription(new RTCSessionDescription({type:'answer',sdp:data.sdp}));
            addSys('✅ اكتمل الاتصال!');
            myCode.value='✅ متصل';
            copy.disabled=true;
        }

        function sendMsg(){
            const t=msgInput.value.trim();
            if(!t||!connected||!dc||dc.readyState!=='open')return;
            dc.send(JSON.stringify({type:'chat',text:t}));
            addMsg(t,true);
            msgInput.value='';
        }

        function resetAll(){
            if(dc)dc.close();
            if(pc)pc.close();
            pc=null;dc=null;candidates=[];isHost=false;connected=false;
            updStatus(false);
            myCode.value='';copy.disabled=true;peerCode.value='';
            msgInput.value='';hint.style.display='';
            addSys('🔄 تم التعيين - ابدأ من جديد');
        }

        copy.onclick=()=>{
            if(myCode.value&&myCode.value!=='✅ متصل'){
                navigator.clipboard.writeText(myCode.value).then(()=>addSys('📋 تم النسخ!')).catch(()=>{myCode.select();document.execCommand('copy');addSys('📋 تم النسخ!')});
            }
        };

        join.onclick=async()=>{
            const c=peerCode.value.trim();
            if(!c)return addSys('⚠️ الصق الكود أولاً');
            if(isHost&&pc)await completeHost(c);
            else if(!pc)await doJoin(c);
            else addSys('⚠️ استخدم إعادة التعيين أولاً');
        };

        reset.onclick=resetAll;
        sendBtn.onclick=sendMsg;
        msgInput.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();sendMsg()}};

        (async()=>{addSys('🚀 جاري التجهيز...');await doHost()})();
    </script>
</body>
</html>
